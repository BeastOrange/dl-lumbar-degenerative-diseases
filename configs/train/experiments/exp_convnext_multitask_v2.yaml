# 多任务学习 v2: 仅5个椎管狭窄任务 + 每任务class_weight
# 策略: 减少任务数降低优化难度，每任务class_weight平衡严重倾斜的标签分布
dataset_root: ./rsna-2024-lumbar-spine-degenerative-classification
processed_root: ./artifacts/processed
runs_root: ./artifacts/runs
metadata_root: ./artifacts/metadata
model_name: convnext_tiny_cbam
fusion_enabled: true
target_columns:
  - spinal_canal_stenosis_l1_l2
  - spinal_canal_stenosis_l2_l3
  - spinal_canal_stenosis_l3_l4
  - spinal_canal_stenosis_l4_l5
  - spinal_canal_stenosis_l5_s1
num_classes: 3
pretrained: true
in_channels: 1
dropout: 0.3
batch_size: 16
num_workers: 8
epochs: 20
loss_name: cross_entropy
label_smoothing: 0.05
class_weight_mode: balanced
sampler_mode: balanced
train_augment_mode: light
learning_rate: 0.0001
weight_decay: 0.0005
optimizer: adamw
scheduler: cosine
amp: true
seed: 42
image_size: 224
device: auto
folds: 3
train_ratio: 0.8
max_studies: null
max_train_samples: null
max_val_samples: null
overfit_subset_size: null
early_stopping_patience: 10
